name = "alongside"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[alias]
"@shared" = "../shared"
"drizzle-orm" = "./node_modules/drizzle-orm"
"drizzle-orm/d1" = "./node_modules/drizzle-orm/d1"
"drizzle-orm/sqlite-core" = "./node_modules/drizzle-orm/sqlite-core"
"valibot" = "./node_modules/valibot"

# AUTH_TOKEN is set via `wrangler secret put AUTH_TOKEN`
# For local dev, override in .dev.vars:
#   AUTH_TOKEN=dev-token-change-me

[[d1_databases]]
binding = "DB"
database_name = "alongside-db"
database_id = "10a76313-bd36-41ff-ad76-52f591e002c4"
