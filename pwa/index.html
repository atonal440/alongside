<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alongside</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a1a1a">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #1a1a1a;
      --surface: #252525;
      --surface-hover: #2f2f2f;
      --border: #333;
      --text: #e0e0e0;
      --text-dim: #888;
      --accent: #6b9fff;
      --accent-dim: #4a7ad4;
      --done: #4a4a4a;
      --radius: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 600px;
      margin: 0 auto;
      padding: 16px;
      min-height: 100vh;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    header h1 { font-size: 20px; font-weight: 600; }

    nav { display: flex; gap: 8px; }

    nav button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 6px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
    }

    nav button.active {
      color: var(--accent);
      border-color: var(--accent-dim);
    }

    .sync-status {
      font-size: 11px;
      color: var(--text-dim);
      text-align: right;
      margin-bottom: 12px;
    }

    .sync-status.offline { color: #e57373; }

    .task-group { margin-bottom: 24px; }

    .task-group h2 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .task {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px;
      background: var(--surface);
      border-radius: var(--radius);
      margin-bottom: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .task:hover { background: var(--surface-hover); }

    .task input[type="checkbox"] {
      margin-top: 2px;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .task-content { flex: 1; min-width: 0; }
    .task-title { font-size: 15px; line-height: 1.4; }
    .task-meta { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
    .task.done .task-title { text-decoration: line-through; color: var(--done); }

    .add-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .add-bar input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 12px;
      border-radius: var(--radius);
      font-size: 15px;
      outline: none;
    }

    .add-bar input:focus { border-color: var(--accent-dim); }

    .add-bar button, .session-btn {
      background: var(--accent-dim);
      border: none;
      color: white;
      padding: 10px 16px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 14px;
      white-space: nowrap;
    }

    .add-bar button:hover, .session-btn:hover { background: var(--accent); }

    .edit-form {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 24px;
    }

    .edit-form label {
      display: block;
      font-size: 12px;
      color: var(--text-dim);
      margin-bottom: 4px;
      margin-top: 12px;
    }

    .edit-form label:first-child { margin-top: 0; }

    .edit-form input, .edit-form textarea, .edit-form select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 10px;
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
      outline: none;
    }

    .edit-form textarea { resize: vertical; min-height: 60px; }
    .edit-form input:focus, .edit-form textarea:focus { border-color: var(--accent-dim); }

    .edit-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .edit-actions button {
      padding: 8px 16px;
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 13px;
      border: 1px solid var(--border);
    }

    .btn-save { background: var(--accent-dim); color: white; border: none !important; }
    .btn-cancel { background: transparent; color: var(--text-dim); }
    .btn-delete { background: transparent; color: #e57373; border-color: #e57373 !important; margin-left: auto; }

    .session-bar {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 16px;
    }

    .session-bar span { font-size: 13px; color: var(--text-dim); }

    .empty {
      text-align: center;
      color: var(--text-dim);
      padding: 40px 0;
      font-size: 14px;
    }

    .task-select {
      width: 18px;
      height: 18px;
      margin-top: 2px;
    }

    .settings-banner {
      background: #2a2020;
      border: 1px solid #553333;
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 16px;
      font-size: 13px;
    }

    .settings-banner summary {
      cursor: pointer;
      color: #e57373;
    }

    .settings-banner .fields { margin-top: 10px; }

    .settings-banner label {
      display: block;
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 8px;
      margin-bottom: 2px;
    }

    .settings-banner input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 8px;
      border-radius: 4px;
      font-size: 13px;
      font-family: monospace;
    }

    .settings-banner button {
      margin-top: 10px;
      background: var(--accent-dim);
      border: none;
      color: white;
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 16px;
      font-size: 13px;
      color: var(--text);
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 100;
    }

    .toast.visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast .next-date { color: var(--accent); }

    /* ── Card / Suggest view ── */
    .card-view {
      display: flex;
      flex-direction: column;
      align-items: stretch;
    }

    .task-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px 24px 20px;
      margin-bottom: 4px;
    }

    .card-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      margin-bottom: 10px;
    }

    .card-title {
      font-size: 20px;
      font-weight: 600;
      line-height: 1.35;
      margin-bottom: 10px;
    }

    .card-notes {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.5;
    }

    .card-kickoff {
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
      border-left: 3px solid var(--accent-dim);
      padding: 10px 12px;
      border-radius: 0 4px 4px 0;
      margin-top: 14px;
      line-height: 1.5;
    }

    .card-edit-link {
      display: inline-block;
      margin-top: 14px;
      font-size: 12px;
      color: var(--text-dim);
      text-decoration: none;
    }

    .card-edit-link:hover { color: var(--text); }

    .card-actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .btn-skip {
      flex: 1;
      padding: 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-size: 14px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    .btn-skip:hover { background: var(--surface-hover); color: var(--text); }

    .btn-act {
      flex: 2;
      padding: 12px;
      border-radius: var(--radius);
      border: none;
      background: var(--accent-dim);
      color: white;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-act:hover { background: var(--accent); }

    .card-counter {
      font-size: 12px;
      color: var(--text-dim);
      text-align: center;
      padding: 10px 0 4px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Alongside</h1>
    <nav>
      <button class="active" data-view="suggest">Suggest</button>
      <button data-view="all">All</button>
      <button data-view="session">Session</button>
    </nav>
  </header>

  <div class="sync-status" id="sync-status">synced</div>

  <div id="settings-banner"></div>

  <main id="app"></main>
  <div class="toast" id="toast"></div>

  <script>
    // ── Config ──
    // Default to the local worker in dev; empty string means local-only mode
    const DEFAULT_API = location.hostname === 'localhost' ? 'http://localhost:8787' : '';
    let API_BASE = localStorage.getItem('alongside_api') ?? DEFAULT_API;
    let AUTH_TOKEN = localStorage.getItem('alongside_token') || 'dev-token-change-me';

    // ── IndexedDB ──
    const IDB_NAME = 'alongside';
    const IDB_VERSION = 1;

    function openDB() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(IDB_NAME, IDB_VERSION);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains('tasks')) {
            const store = db.createObjectStore('tasks', { keyPath: 'id' });
            store.createIndex('status', 'status');
            store.createIndex('due_date', 'due_date');
          }
          if (!db.objectStoreNames.contains('pending_ops')) {
            db.createObjectStore('pending_ops', { keyPath: 'id', autoIncrement: true });
          }
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function idbGetAll(storeName) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readonly');
        const req = tx.objectStore(storeName).getAll();
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }

    async function idbPut(storeName, item) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        tx.objectStore(storeName).put(item);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    async function idbDelete(storeName, key) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        tx.objectStore(storeName).delete(key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    async function idbClear(storeName) {
      const db = await openDB();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(storeName, 'readwrite');
        tx.objectStore(storeName).clear();
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }

    // ── API helpers ──
    async function apiFetch(path, options = {}) {
      if (!API_BASE) return null;
      try {
        const res = await fetch(`${API_BASE}${path}`, {
          ...options,
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${AUTH_TOKEN}`,
            ...options.headers,
          },
        });
        if (!res.ok) throw new Error(`${res.status}`);
        return res.json();
      } catch (e) {
        console.warn('API fetch failed:', e);
        return null;
      }
    }

    // ── Sync ──
    // Server is source of truth. IndexedDB is a cache + offline buffer.
    // 1. Flush pending ops (offline writes) to server
    // 2. Fetch full state from server
    // 3. Replace local state, keeping only unsynced offline-created tasks
    async function syncFromServer() {
      const remote = await apiFetch('/api/tasks/sync');
      if (!remote) {
        updateSyncStatus(false);
        return;
      }

      const remoteMap = Object.fromEntries(remote.map(t => [t.id, t]));
      const pendingOps = await idbGetAll('pending_ops');

      // Collect IDs of tasks created offline that haven't synced yet
      const offlineCreatedTitles = new Set(
        pendingOps
          .filter(op => op.method === 'POST' && op.path === '/api/tasks')
          .map(op => op.body?.title)
      );

      // Clear local tasks and replace with server state
      const local = await idbGetAll('tasks');
      for (const lt of local) {
        if (!remoteMap[lt.id] && !offlineCreatedTitles.has(lt.title)) {
          // Not on server and not an unsynced offline create — remove
          await idbDelete('tasks', lt.id);
        }
      }

      // Write all server tasks to local (server wins)
      for (const rt of remote) {
        await idbPut('tasks', rt);
      }

      updateSyncStatus(true);
    }

    async function flushPendingOps() {
      const ops = await idbGetAll('pending_ops');
      for (const op of ops) {
        const result = await apiFetch(op.path, { method: op.method, body: op.body ? JSON.stringify(op.body) : undefined });
        if (result !== null) {
          await idbDelete('pending_ops', op.id);

          // If an offline-created task just synced, rewrite any queued ops
          // that still reference the old local temp ID with the server ID
          if (op.method === 'POST' && op.path === '/api/tasks' && op.local_id && result.id) {
            const oldId = op.local_id;
            const newId = result.id;
            await idbDelete('tasks', oldId);
            await idbPut('tasks', result);
            const remaining = await idbGetAll('pending_ops');
            for (const pending of remaining) {
              if (pending.path.includes(oldId)) {
                pending.path = pending.path.replace(oldId, newId);
                await idbPut('pending_ops', pending);
              }
            }
          }
        }
      }
    }

    async function queueOp(method, path, body, localId) {
      await idbPut('pending_ops', { method, path, body, local_id: localId || null, created_at: new Date().toISOString() });
    }

    function updateSyncStatus(online) {
      const el = document.getElementById('sync-status');
      if (online) {
        el.textContent = 'synced';
        el.className = 'sync-status';
      } else {
        el.textContent = 'offline - changes saved locally';
        el.className = 'sync-status offline';
      }
    }

    // ── Task operations (local-first) ──
    function genId() {
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789_-';
      let id = 't_';
      for (let i = 0; i < 5; i++) id += chars[Math.floor(Math.random() * chars.length)];
      return id;
    }

    async function createTask(title, opts = {}) {
      const now = new Date().toISOString();
      const task = {
        id: genId(),
        title,
        notes: opts.notes || null,
        status: 'pending',
        due_date: opts.due_date || null,
        recurrence: opts.recurrence || null,
        session_id: null,
        created_at: now,
        updated_at: now,
        snoozed_until: null,
      };
      await idbPut('tasks', task);

      const result = await apiFetch('/api/tasks', { method: 'POST', body: JSON.stringify({ title, ...opts }) });
      if (result) {
        // Use server-generated ID
        await idbDelete('tasks', task.id);
        await idbPut('tasks', result);
      } else {
        await queueOp('POST', '/api/tasks', { title, ...opts }, task.id);
      }
      render();
    }

    async function completeTask(id) {
      const task = (await idbGetAll('tasks')).find(t => t.id === id);
      if (!task) return;
      const wasRecurring = !!task.recurrence;
      task.status = 'done';
      task.updated_at = new Date().toISOString();
      await idbPut('tasks', task);

      const result = await apiFetch(`/api/tasks/${id}/complete`, { method: 'POST' });
      if (result && result.next) {
        await idbPut('tasks', result.next);
        showToast(`Done! Next: <span class="next-date">${result.next.due_date}</span>`);
      } else if (wasRecurring && !result) {
        showToast('Done! Next occurrence will sync when online.');
      } else if (!result) {
        await queueOp('POST', `/api/tasks/${id}/complete`, null);
      }
      render();
    }

    function showToast(html) {
      const el = document.getElementById('toast');
      el.innerHTML = html;
      el.classList.add('visible');
      clearTimeout(el._timer);
      el._timer = setTimeout(() => el.classList.remove('visible'), 3000);
    }

    async function updateTask(id, updates) {
      const task = (await idbGetAll('tasks')).find(t => t.id === id);
      if (!task) return;
      Object.assign(task, updates, { updated_at: new Date().toISOString() });
      await idbPut('tasks', task);

      const result = await apiFetch(`/api/tasks/${id}`, { method: 'PATCH', body: JSON.stringify(updates) });
      if (!result) {
        await queueOp('PATCH', `/api/tasks/${id}`, updates);
      }
      render();
    }

    async function deleteTask(id) {
      await idbDelete('tasks', id);
      const result = await apiFetch(`/api/tasks/${id}`, { method: 'DELETE' });
      if (!result) {
        await queueOp('DELETE', `/api/tasks/${id}`, null);
      }
      render();
    }

    async function activateTask(id, sid) {
      const task = (await idbGetAll('tasks')).find(t => t.id === id);
      if (!task) return;
      task.status = 'active';
      task.session_id = sid;
      task.updated_at = new Date().toISOString();
      await idbPut('tasks', task);
      const result = await apiFetch(`/api/tasks/${id}`, { method: 'PATCH', body: JSON.stringify({ status: 'active' }) });
      if (!result) await queueOp('PATCH', `/api/tasks/${id}`, { status: 'active' });
      render();
    }

    // ── State ──
    let currentView = 'suggest';
    let editingTask = null;
    let sessionId = localStorage.getItem('alongside_session') || null;
    const cardSeen = new Set(); // tasks skipped this session in Suggest view

    // ── Rendering ──
    function render() {
      idbGetAll('tasks').then(tasks => {
        const app = document.getElementById('app');
        app.innerHTML = '';

        if (editingTask) {
          renderEditForm(app, editingTask, tasks);
          return;
        }

        switch (currentView) {
          case 'suggest': renderSuggest(app, tasks); break;
          case 'all': renderAll(app, tasks); break;
          case 'session': renderSession(app, tasks); break;
        }
      });
    }

    function taskHTML(task, opts = {}) {
      const meta = [];
      if (task.due_date) meta.push(task.due_date);
      if (task.recurrence) meta.push('recurring');
      if (task.notes) meta.push(task.notes.substring(0, 50));

      const done = task.status === 'done';
      return `
        <div class="task ${done ? 'done' : ''}" data-id="${task.id}">
          ${opts.selectable
            ? `<input type="checkbox" class="task-select" data-id="${task.id}" ${task.status === 'active' ? 'checked' : ''}>`
            : `<input type="checkbox" ${done ? 'checked' : ''} data-complete="${task.id}">`
          }
          <div class="task-content" data-edit="${task.id}">
            <div class="task-title">${esc(task.title)}</div>
            ${meta.length ? `<div class="task-meta">${esc(meta.join(' · '))}</div>` : ''}
          </div>
        </div>
      `;
    }

    function suggestQueue(tasks, today) {
      const now = new Date().toISOString();
      const candidates = tasks.filter(t =>
        t.status !== 'done' &&
        !(t.status === 'snoozed' && t.snoozed_until && t.snoozed_until > now) &&
        !cardSeen.has(t.id)
      );
      const active = candidates.filter(t => t.status === 'active');
      const overdue = candidates
        .filter(t => t.status === 'pending' && t.due_date && t.due_date <= today)
        .sort((a, b) => a.due_date.localeCompare(b.due_date));
      const ready = candidates.filter(t =>
        t.status === 'pending' && t.kickoff_note && (!t.due_date || t.due_date > today)
      );
      const rest = candidates
        .filter(t => t.status === 'pending' && !t.kickoff_note && (!t.due_date || t.due_date > today))
        .sort((a, b) => a.created_at.localeCompare(b.created_at));
      return [...active, ...overdue, ...ready, ...rest];
    }

    function renderSuggest(app, tasks) {
      const today = new Date().toISOString().split('T')[0];
      const queue = suggestQueue(tasks, today);

      const addBar = `
        <div class="add-bar">
          <input type="text" id="new-task" placeholder="Add a task..." />
          <button id="add-btn">Add</button>
        </div>`;

      if (queue.length === 0) {
        app.innerHTML = addBar + '<div class="empty">All clear! Add something above.</div>';
        setupAddBar();
        return;
      }

      const task = queue[0];
      const rest = queue.length - 1;
      const isActive = task.status === 'active';
      const isOverdue = task.due_date && task.due_date < today;
      const isDueToday = task.due_date === today;

      let label = '';
      if (isActive) label = 'In progress';
      else if (isOverdue) label = `Overdue · ${task.due_date}`;
      else if (isDueToday) label = 'Due today';
      else if (task.due_date) label = `Due ${task.due_date}`;
      if (task.recurrence) label += (label ? ' · ' : '') + 'Recurring';

      app.innerHTML = `
        ${addBar}
        <div class="card-view">
          <div class="task-card">
            ${label ? `<div class="card-label">${esc(label)}</div>` : ''}
            <div class="card-title">${esc(task.title)}</div>
            ${task.notes ? `<div class="card-notes">${esc(task.notes)}</div>` : ''}
            ${task.kickoff_note ? `<div class="card-kickoff">${esc(task.kickoff_note)}</div>` : ''}
            <a class="card-edit-link" href="#" data-edit="${task.id}">Edit ›</a>
          </div>
          <div class="card-actions">
            ${isActive
              ? `<button class="btn-skip" id="card-done">Mark done</button>
                 <button class="btn-act" id="card-next">Next ›</button>`
              : `<button class="btn-skip" id="card-skip">Skip →</button>
                 <button class="btn-act" id="card-start">Start this</button>`
            }
          </div>
          <div class="card-counter">${rest > 0 ? `${rest} more` : 'Last one'}</div>
        </div>`;

      setupAddBar();

      document.getElementById('card-skip')?.addEventListener('click', () => {
        cardSeen.add(task.id); render();
      });
      document.getElementById('card-start')?.addEventListener('click', () => activateTask(task.id, null));
      document.getElementById('card-next')?.addEventListener('click', () => {
        cardSeen.add(task.id); render();
      });
      document.getElementById('card-done')?.addEventListener('click', () => completeTask(task.id));
    }

    function renderAll(app, tasks) {
      const groups = { active: [], pending: [], snoozed: [], done: [] };
      for (const t of tasks) {
        if (groups[t.status]) groups[t.status].push(t);
      }

      app.innerHTML = `
        <div class="add-bar">
          <input type="text" id="new-task" placeholder="Add a task..." />
          <button id="add-btn">Add</button>
        </div>
        ${Object.entries(groups)
          .filter(([, list]) => list.length > 0)
          .map(([status, list]) => `
            <div class="task-group">
              <h2>${status} (${list.length})</h2>
              ${list.map(t => taskHTML(t)).join('')}
            </div>
          `).join('')}
      `;

      setupAddBar();
    }

    function renderSession(app, tasks) {
      const active = tasks.filter(t => t.status === 'active');

      if (active.length === 0) {
        app.innerHTML = '<div class="empty">Nothing in progress. Start a task from Suggest.</div>';
        return;
      }

      app.innerHTML = active.map(t => {
        const meta = [];
        const today = new Date().toISOString().split('T')[0];
        if (t.due_date && t.due_date < today) meta.push(`Overdue · ${t.due_date}`);
        else if (t.due_date === today) meta.push('Due today');
        else if (t.due_date) meta.push(`Due ${t.due_date}`);
        if (t.recurrence) meta.push('Recurring');

        return `
          <div class="task-card" style="margin-bottom:12px;">
            ${meta.length ? `<div class="card-label">${esc(meta.join(' · '))}</div>` : ''}
            <div class="card-title">${esc(t.title)}</div>
            ${t.notes ? `<div class="card-notes">${esc(t.notes)}</div>` : ''}
            ${t.kickoff_note ? `<div class="card-kickoff">${esc(t.kickoff_note)}</div>` : ''}
            <div class="card-actions">
              <a class="card-edit-link" href="#" data-edit="${t.id}" style="margin-top:0;align-self:center;">Edit ›</a>
              <button class="btn-act" style="flex:1;" data-complete="${t.id}">Mark done</button>
            </div>
          </div>`;
      }).join('');
    }

    function renderEditForm(app, task) {
      app.innerHTML = `
        <div class="edit-form">
          <label>Title</label>
          <input type="text" id="edit-title" value="${esc(task.title)}" />
          <label>Notes</label>
          <textarea id="edit-notes">${esc(task.notes || '')}</textarea>
          <label>Kickoff note <span style="font-weight:normal;color:var(--text-dim)">(what do you need to start?)</span></label>
          <textarea id="edit-kickoff">${esc(task.kickoff_note || '')}</textarea>
          <label>Due date</label>
          <input type="date" id="edit-due" value="${task.due_date || ''}" />
          <label>Recurrence</label>
          <select id="edit-recurrence">
            <option value="">None</option>
            <option value="FREQ=DAILY;INTERVAL=1" ${task.recurrence === 'FREQ=DAILY;INTERVAL=1' ? 'selected' : ''}>Daily</option>
            <option value="FREQ=WEEKLY;INTERVAL=1" ${task.recurrence === 'FREQ=WEEKLY;INTERVAL=1' ? 'selected' : ''}>Weekly</option>
            <option value="FREQ=MONTHLY;INTERVAL=1" ${task.recurrence === 'FREQ=MONTHLY;INTERVAL=1' ? 'selected' : ''}>Monthly</option>
          </select>
          <div class="edit-actions">
            <button class="btn-save" id="save-edit">Save</button>
            <button class="btn-cancel" id="cancel-edit">Cancel</button>
            <button class="btn-delete" id="delete-task">Delete</button>
          </div>
        </div>
      `;

      document.getElementById('save-edit').addEventListener('click', () => {
        updateTask(task.id, {
          title: document.getElementById('edit-title').value,
          notes: document.getElementById('edit-notes').value || null,
          kickoff_note: document.getElementById('edit-kickoff').value || null,
          due_date: document.getElementById('edit-due').value || null,
          recurrence: document.getElementById('edit-recurrence').value || null,
        });
        editingTask = null;
      });

      document.getElementById('cancel-edit').addEventListener('click', () => {
        editingTask = null;
        render();
      });

      document.getElementById('delete-task').addEventListener('click', () => {
        if (confirm('Delete this task?')) {
          deleteTask(task.id);
          editingTask = null;
        }
      });
    }

    function setupAddBar() {
      const input = document.getElementById('new-task');
      const btn = document.getElementById('add-btn');
      if (!input || !btn) return;

      const add = () => {
        const title = input.value.trim();
        if (title) { createTask(title); input.value = ''; }
      };

      btn.addEventListener('click', add);
      input.addEventListener('keydown', (e) => { if (e.key === 'Enter') add(); });
    }

    function esc(str) {
      const div = document.createElement('div');
      div.textContent = str || '';
      return div.innerHTML;
    }

    // ── Event delegation ──
    document.getElementById('app').addEventListener('click', async (e) => {
      const completeId = e.target.dataset?.complete;
      if (completeId) {
        completeTask(completeId);
        return;
      }

      const editId = e.target.closest('[data-edit]')?.dataset.edit;
      if (editId) {
        const tasks = await idbGetAll('tasks');
        editingTask = tasks.find(t => t.id === editId);
        if (editingTask) render();
      }
    });

    // ── Navigation ──
    document.querySelectorAll('nav button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentView = btn.dataset.view;
        editingTask = null;
        render();
      });
    });

    // ── Settings banner ──
    function showSettingsBanner(reason) {
      const el = document.getElementById('settings-banner');
      el.innerHTML = `
        <details class="settings-banner" open>
          <summary>${reason}</summary>
          <div class="fields">
            <label>Worker URL</label>
            <input id="cfg-api" value="${esc(API_BASE)}" placeholder="http://localhost:8787" />
            <label>Auth token</label>
            <input id="cfg-token" value="${esc(AUTH_TOKEN)}" placeholder="dev-token-change-me" />
            <button id="cfg-save">Connect</button>
          </div>
        </details>
      `;
      document.getElementById('cfg-save').addEventListener('click', () => {
        API_BASE = document.getElementById('cfg-api').value.replace(/\/$/, '');
        AUTH_TOKEN = document.getElementById('cfg-token').value;
        localStorage.setItem('alongside_api', API_BASE);
        localStorage.setItem('alongside_token', AUTH_TOKEN);
        el.innerHTML = '';
        init();
      });
    }

    // ── Init ──
    async function init() {
      await flushPendingOps();
      await syncFromServer();
      render();

      // If sync failed, show settings so the user can fix the connection
      if (document.getElementById('sync-status').classList.contains('offline')) {
        showSettingsBanner('Could not connect to worker');
      }

      // Periodic sync
      setInterval(async () => {
        await flushPendingOps();
        await syncFromServer();
        render();
      }, 30000);
    }

    // Service worker registration
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
      navigator.serviceWorker.addEventListener('message', (e) => {
        if (e.data.type === 'sync-requested') {
          flushPendingOps().then(syncFromServer).then(render);
        }
      });
    }

    init();
  </script>
</body>
</html>
